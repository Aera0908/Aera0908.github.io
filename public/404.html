<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Aira Ynte - Web Resume</title>
  <script>
    // GitHub Pages SPA redirect trick:
    // Encode the current path as a query param and redirect to root.
    // The main index.html will pick this up and restore the path via replaceState.
    var pathSegmentsToKeep = 0; // User site (username.github.io), no repo prefix
    var l = window.location;
    l.replace(
      l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
      l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
      l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
      (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
      l.hash
    );
  </script>
</head>
<body>
</body>
</html>
