name: Deploy to GitHub Pages

on:
  # deploy on every push to main
  push:
    branches: [main]
  # ...and allow manual runs from the Actions tab
  workflow_dispatch:

# permissions the deploy-pages action needs
permissions:
  contents: read
  pages: write
  id-token: write

# one deploy at a time; don't cancel an in-flight production deploy
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        # `npm install` (not `npm ci`): the lockfile is generated on Windows,
        # which never resolves unrs-resolver's wasm binding, so it omits its
        # transitive @emnapi/* deps that Linux DOES pull in — strict `npm ci`
        # then rejects the tree ("Missing @emnapi/* from lock file"). install
        # reconciles it on the runner. --ignore-scripts skips native
        # postinstalls (sharp, unrs-resolver) the static build never needs.
        run: npm install --no-audit --no-fund --ignore-scripts

      - name: Build static export
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: "1"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # `output: "export"` writes the static site here
          path: out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
